<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard — Astha Multi Speciality Hospital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --sky:#38BDF8; --sky-100:#E0F2FE; --sky-50:#EFF9FF;
  --teal:#0D9488; --teal-700:#0F766E; --teal-50:#F0FDFA;
  --navy:#0C2340; --navy-700:#13315C;
  --cream:#FAF7F2;
  --red:#DC2626; --red-50:#FEF2F2;
  --amber:#F59E0B; --amber-50:#FFFBEB;
  --green:#16A34A; --green-50:#F0FDF4;
  --slate:#475569; --slate-400:#94A3B8; --slate-500:#64748B;

  /* themed surfaces (light by default) */
  --bg:#F8FAFC;
  --surface:#FFFFFF;
  --surface-2:#FFFFFF;
  --surface-3:#F1F5F9;
  --border:#E2E8F0;
  --border-strong:#CBD5E1;
  --text:#0C2340;
  --text-dim:#475569;
  --text-mute:#94A3B8;
  --sidebar-bg:#0C2340;
  --sidebar-text:#CBD5E1;
  --sidebar-active:#13315C;
  --topbar-bg:#FFFFFF;
  --shadow-card: 0 1px 0 rgba(12,35,64,.03), 0 1px 3px rgba(12,35,64,.04);
  --shadow-pop: 0 10px 30px -12px rgba(12,35,64,.18);
}
[data-theme="dark"]{
  --bg:#0A1322;
  --surface:#0F1B30;
  --surface-2:#142640;
  --surface-3:#1B2D4A;
  --border:#1E3354;
  --border-strong:#2A4570;
  --text:#E6EEFB;
  --text-dim:#A5B4CB;
  --text-mute:#64748B;
  --sidebar-bg:#070E1C;
  --sidebar-text:#94A3B8;
  --sidebar-active:#13315C;
  --topbar-bg:#0F1B30;
  --shadow-card: 0 1px 0 rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.25);
  --shadow-pop: 0 10px 30px -12px rgba(0,0,0,.5);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:"Inter",system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  transition:background-color .25s ease, color .25s ease;
}
h1,h2,h3,h4,h5{
  font-family:"Plus Jakarta Sans","Inter",sans-serif;
  margin:0; color:var(--text);
  font-weight:700; letter-spacing:-0.015em;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
::selection{background:var(--sky);color:var(--navy)}

/* layout */
.app{
  display:grid;
  grid-template-columns: var(--sidebar-w, 244px) 1fr;
  min-height:100vh;
  transition:grid-template-columns .22s ease;
}
.app.collapsed{--sidebar-w:72px}

/* SIDEBAR */
.sidebar{
  background:var(--sidebar-bg);
  color:var(--sidebar-text);
  display:flex; flex-direction:column;
  padding:18px 14px 14px;
  border-right:1px solid var(--border);
  position:sticky; top:0; height:100vh;
  z-index:30;
  transition:padding .22s ease;
}
.sb-logo{
  display:flex; align-items:center; gap:11px;
  padding:6px 6px 4px;
  margin-bottom:18px;
}
.sb-logo .mark{
  width:36px; height:36px; border-radius:10px;
  background:linear-gradient(135deg, #38BDF8, #14B8A6);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-family:"Plus Jakarta Sans"; font-weight:800; font-size:18px;
  flex-shrink:0;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.18);
}
.sb-name{font-family:"Plus Jakarta Sans";color:#fff;font-weight:800;font-size:18px;line-height:1.05;white-space:nowrap}
.sb-sub{font-size:10.5px;color:#7DD3FC;text-transform:uppercase;letter-spacing:.14em;margin-top:2px;white-space:nowrap}

.sb-section-label{
  font-size:11px; color:#64748B; text-transform:uppercase; letter-spacing:.14em;
  font-weight:700; margin:18px 12px 8px;
}
.sb-nav{display:flex;flex-direction:column;gap:2px}
.sb-item{
  display:flex; align-items:center; gap:12px;
  padding:10px 12px;
  border-radius:9px;
  color:var(--sidebar-text);
  font-size:14px; font-weight:500;
  cursor:pointer;
  transition:background .15s ease, color .15s ease;
  position:relative;
  white-space:nowrap;
}
.sb-item:hover{background:rgba(255,255,255,.05); color:#fff}
.sb-item.active{
  background:var(--sidebar-active);
  color:#fff;
  font-weight:600;
}
.sb-item.active::before{
  content:""; position:absolute; left:-14px; top:8px; bottom:8px; width:3px;
  background:linear-gradient(180deg,#38BDF8,#14B8A6); border-radius:0 3px 3px 0;
}
.sb-item .badge{
  margin-left:auto;
  background:var(--teal);
  color:#fff; font-size:11px; font-weight:700;
  padding:2px 7px; border-radius:999px;
  min-width:20px; text-align:center;
}
.sb-item .icn{flex-shrink:0;color:#94A3B8}
.sb-item.active .icn{color:#5EEAD4}

.sb-user{
  margin-top:auto;
  padding:12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  display:flex; align-items:center; gap:10px;
}
.sb-user-avatar{
  width:36px;height:36px;border-radius:999px;
  background:linear-gradient(135deg,#F59E0B,#DC2626);
  color:#fff; font-weight:700; font-size:13px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0; font-family:"Plus Jakarta Sans";
}
.sb-user-info{display:flex;flex-direction:column;line-height:1.1;min-width:0;flex:1}
.sb-user-name{color:#fff;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{color:#94A3B8;font-size:11.5px;margin-top:3px;white-space:nowrap}
.sb-user-menu{color:#94A3B8;cursor:pointer;padding:4px;border-radius:6px}
.sb-user-menu:hover{color:#fff;background:rgba(255,255,255,.06)}

/* collapsed states */
.app.collapsed .sb-name, .app.collapsed .sb-sub,
.app.collapsed .sb-item span:not(.badge), .app.collapsed .sb-section-label,
.app.collapsed .sb-user-info, .app.collapsed .sb-user-menu{display:none}
.app.collapsed .sb-item{justify-content:center;padding:10px}
.app.collapsed .sb-user{justify-content:center}
.app.collapsed .sb-logo{justify-content:center}
.app.collapsed .sb-logo > div:last-child{display:none}
.app.collapsed .sb-item .badge{position:absolute; top:-3px; right:-3px; padding:0; min-width:8px; width:8px; height:8px; border-radius:999px; font-size:0}

/* TOPBAR */
.topbar{
  position:sticky; top:0; z-index:20;
  background:var(--topbar-bg);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  height:68px;
  display:flex; align-items:center; gap:18px;
  transition:background-color .25s ease;
}
.top-collapse{
  width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim); border:1px solid var(--border); background:var(--surface);
  cursor:pointer; transition:border-color .15s, color .15s;
}
.top-collapse:hover{border-color:var(--border-strong);color:var(--text)}

.search{
  flex:1; max-width:520px; position:relative;
}
.search input{
  width:100%; padding:11px 14px 11px 42px;
  background:var(--surface-3); border:1px solid transparent;
  border-radius:10px; outline:none;
  font-size:14px; color:var(--text);
  transition:border-color .15s, background-color .15s;
}
.search input::placeholder{color:var(--text-mute)}
.search input:focus{border-color:var(--teal); background:var(--surface)}
.search-icn{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-mute)}
.search-kbd{
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  display:flex; gap:3px; color:var(--text-mute);
}
.search-kbd span{
  background:var(--surface); border:1px solid var(--border);
  border-radius:5px; padding:2px 6px;
  font-family:"JetBrains Mono",monospace; font-size:10.5px;
  font-weight:600;
}

.top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.top-btn{
  width:38px;height:38px;border-radius:9px;
  background:var(--surface); border:1px solid var(--border);
  color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer; transition:border-color .15s, color .15s;
  position:relative;
}
.top-btn:hover{border-color:var(--border-strong);color:var(--text)}
.top-btn .dot{
  position:absolute; top:8px; right:9px;
  width:8px;height:8px;border-radius:999px;
  background:var(--red); border:2px solid var(--surface);
}

.top-newbtn{
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 14px;
  background:var(--teal); color:#fff;
  border-radius:9px; font-weight:600; font-size:13.5px;
  font-family:"Plus Jakarta Sans";
  cursor:pointer; transition:background .15s, transform .15s;
}
.top-newbtn:hover{background:var(--teal-700);transform:translateY(-1px)}

.top-divider{width:1px;height:24px;background:var(--border);margin:0 4px}

.top-user{
  display:flex; align-items:center; gap:10px;
  padding:5px 10px 5px 5px;
  border:1px solid var(--border);
  border-radius:999px; background:var(--surface);
  cursor:pointer; transition:border-color .15s;
}
.top-user:hover{border-color:var(--border-strong)}
.top-user .avt{
  width:30px;height:30px;border-radius:999px;
  background:linear-gradient(135deg,#F59E0B,#DC2626); color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:"Plus Jakarta Sans"; font-weight:700; font-size:12.5px;
}
.top-user-greet{display:flex;flex-direction:column;line-height:1.1;padding-right:4px}
.top-user-greet .h{font-size:11px;color:var(--text-mute);font-weight:500}
.top-user-greet .n{font-size:13px;color:var(--text);font-weight:600}

/* MAIN content */
.page{
  padding:28px 28px 60px;
  max-width:1500px;
}
.page-head{
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:20px; margin-bottom:26px; flex-wrap:wrap;
}
.page-title{font-size:28px;font-weight:800}
.page-sub{font-size:14.5px;color:var(--text-dim);margin-top:6px}
.page-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* common chips */
.chip-row{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;gap:2px}
.chip{
  padding:7px 14px; border-radius:7px;
  font-size:13px; font-weight:600; color:var(--text-dim);
  cursor:pointer; transition:background .15s, color .15s;
}
.chip:hover{color:var(--text)}
.chip.active{background:var(--teal); color:#fff}

.btn{
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 14px; border-radius:9px;
  font-weight:600; font-size:13.5px;
  font-family:"Plus Jakarta Sans";
  cursor:pointer; transition:all .15s;
  border:1px solid transparent;
}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-700);transform:translateY(-1px)}
.btn-outline{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn-outline:hover{border-color:var(--border-strong)}
.btn-ghost{color:var(--text-dim)}
.btn-ghost:hover{color:var(--text);background:var(--surface-3)}
.btn-red-outline{background:transparent;color:var(--red);border-color:#FECACA}
.btn-red-outline:hover{background:var(--red);color:#fff;border-color:var(--red)}

/* cards */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:var(--shadow-card);
  transition:background-color .25s, border-color .25s;
}

/* pill / badge */
.pill{
  display:inline-flex; align-items:center; gap:6px;
  padding:3px 10px; border-radius:999px;
  font-size:11.5px; font-weight:600;
}
.pill-teal{background:var(--teal-50);color:var(--teal-700);border:1px solid #99F6E4}
.pill-sky{background:var(--sky-50);color:#0369A1;border:1px solid #BAE6FD}
.pill-green{background:var(--green-50);color:#15803D;border:1px solid #BBF7D0}
.pill-amber{background:var(--amber-50);color:#B45309;border:1px solid #FDE68A}
.pill-red{background:var(--red-50);color:#B91C1C;border:1px solid #FECACA}
.pill-slate{background:var(--surface-3);color:var(--text-dim);border:1px solid var(--border)}
[data-theme="dark"] .pill-teal{background:rgba(13,148,136,.18);color:#5EEAD4;border-color:rgba(94,234,212,.25)}
[data-theme="dark"] .pill-sky{background:rgba(56,189,248,.15);color:#7DD3FC;border-color:rgba(125,211,252,.25)}
[data-theme="dark"] .pill-green{background:rgba(22,163,74,.18);color:#86EFAC;border-color:rgba(134,239,172,.25)}
[data-theme="dark"] .pill-amber{background:rgba(245,158,11,.18);color:#FCD34D;border-color:rgba(252,211,77,.25)}
[data-theme="dark"] .pill-red{background:rgba(220,38,38,.2);color:#FCA5A5;border-color:rgba(252,165,165,.25)}

/* table */
table.t{width:100%;border-collapse:collapse}
table.t th{
  text-align:left; padding:14px 18px;
  font-size:11.5px; font-weight:700;
  color:var(--text-mute); text-transform:uppercase; letter-spacing:.08em;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  white-space:nowrap;
}
table.t td{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  font-size:14px; color:var(--text);
  vertical-align:middle;
}
table.t tr:last-child td{border-bottom:none}
table.t tr:hover td{background:var(--surface-3)}

.avatar-mini{
  width:34px;height:34px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;
  color:#fff; font-family:"Plus Jakarta Sans"; font-weight:700; font-size:12.5px;
  flex-shrink:0;
}

/* modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(12,35,64,.55);
  display:flex;align-items:center;justify-content:center;
  z-index:100; padding:20px;
  backdrop-filter: blur(2px);
}
[data-theme="dark"] .modal-bg{background:rgba(0,0,0,.7)}
.modal{
  width:100%;max-width:560px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:var(--shadow-pop);
  display:flex;flex-direction:column;
  max-height:90vh; overflow:hidden;
}
.modal-head{
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.modal-body{padding:22px 24px;overflow-y:auto}
.modal-foot{
  padding:16px 24px;
  border-top:1px solid var(--border);
  display:flex; gap:10px; justify-content:flex-end;
  background:var(--surface-3);
}

/* form fields */
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.f-col{display:flex;flex-direction:column;gap:6px}
.f-col > label{font-size:12.5px;font-weight:600;color:var(--text)}
.f-col input, .f-col select, .f-col textarea{
  padding:10px 12px;
  border:1px solid var(--border);
  background:var(--surface);
  border-radius:8px; outline:none;
  font-size:14px;
  transition:border-color .15s, box-shadow .15s;
}
.f-col input:focus, .f-col select:focus, .f-col textarea:focus{
  border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(13,148,136,.14);
}
.f-segment{display:flex;gap:6px}
.f-segment button{
  flex:1;padding:8px;border-radius:7px;
  border:1px solid var(--border); background:var(--surface);
  color:var(--text); font-weight:600; font-size:13px; cursor:pointer;
  transition:all .15s;
}
.f-segment button.on{border-color:var(--teal); background:var(--teal-50); color:var(--teal-700)}
[data-theme="dark"] .f-segment button.on{background:rgba(13,148,136,.2); color:#5EEAD4}

/* small utilities */
.muted{color:var(--text-mute)}
.mono{font-family:"JetBrains Mono",monospace;font-size:12.5px}

/* scroll polish */
.dash-scroller::-webkit-scrollbar{width:8px;height:8px}
.dash-scroller::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}
.dash-scroller::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}

/* responsive */
@media (max-width: 1100px){
  .app{grid-template-columns:72px 1fr}
  .app .sb-name, .app .sb-sub,
  .app .sb-item span:not(.badge), .app .sb-section-label,
  .app .sb-user-info, .app .sb-user-menu{display:none}
  .app .sb-item{justify-content:center;padding:10px}
  .app .sb-user{justify-content:center}
  .app .sb-logo{justify-content:center}
  .app .sb-logo > div:last-child{display:none}
}
@media (max-width: 760px){
  .topbar{padding:0 14px;gap:8px;height:60px}
  .search{display:none}
  .top-newbtn span{display:none}
  .top-user-greet{display:none}
  .page{padding:18px 14px 80px}
  .page-head{margin-bottom:18px}
  .page-title{font-size:22px}
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="dash/icons.jsx"></script>
<script type="text/babel" src="dash/data.jsx"></script>
<script type="text/babel" src="dash/shell.jsx"></script>
<script type="text/babel" src="dash/page-overview.jsx"></script>
<script type="text/babel" src="dash/page-appointments.jsx"></script>
<script type="text/babel" src="dash/page-opd.jsx"></script>
<script type="text/babel" src="dash/page-patients.jsx"></script>
<script type="text/babel" src="dash/page-doctors.jsx"></script>
<script type="text/babel" src="dash/modals.jsx"></script>
<script type="text/babel" src="dash/app.jsx"></script>
</body>
</html>
